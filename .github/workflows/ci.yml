name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Syntax check all bash scripts
        run: |
          errors=0
          for f in $(find . -name "*.sh" -type f); do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors file(s) failed syntax check"
            exit 1
          fi
          echo "All scripts pass syntax check"

      - name: Verify scenario count
        run: |
          count=$(find scenarios -name "*.sh" -type f | wc -l)
          echo "Found $count scenario files"
          if [ "$count" -ne 50 ]; then
            echo "ERROR: Expected 50 scenarios, found $count"
            exit 1
          fi

      - name: Verify scenario IDs are unique and sequential
        run: |
          ids=$(grep -rh '^SCENARIO_ID=' scenarios/ | sed 's/SCENARIO_ID=//' | sort -n)
          expected=$(seq 1 50)
          if [ "$ids" != "$expected" ]; then
            echo "ERROR: Scenario IDs are not sequential 1-50"
            echo "Got: $ids"
            exit 1
          fi
          echo "All 50 scenario IDs verified (1-50)"

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: error
          scandir: .
          format: gcc
        continue-on-error: true

  smoke-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install k3d v5.8.3
        run: |
          curl -fsSL -o k3d \
            https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64
          echo "dbaa79a76ace7f4ca230a1ff41dc7d8a5036a8ad0309e9c54f9bf3836dbe853e  k3d" | sha256sum -c
          sudo install -m 0755 k3d /usr/local/bin/k3d
          rm k3d

      - name: Smoke test (manual agent, 3 scenarios)
        run: ./kubebench.sh --agent manual --detect-only --scenario 1-3 --precondition-timeout 120
        timeout-minutes: 10

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: kubebench-report
          path: reports/
          retention-days: 30
